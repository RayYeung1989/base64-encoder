<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Encoder/Decoder - Free Online Tool</title>
    <meta name="description" content="Free online Base64 encoder and decoder. Encode/decode text, URLs, and files. 100% client-side - no data sent to server.">
    <meta name="keywords" content="base64 encoder, base64 decoder, online base64, encode decode, base64 converter">
    <meta property="og:title" content="Base64 Encoder/Decoder - Free Online Tool">
    <meta property="og:description" content="Free online Base64 encoder and decoder. 100% client-side.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 12px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .tagline {
            font-size: 1.1rem;
            color: #a0aec0;
        }
        .mode-switch {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }
        .mode-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #a0aec0;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .mode-btn:hover {
            border-color: #00d4ff;
            color: #00d4ff;
        }
        .mode-btn.active {
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            border-color: transparent;
            color: #fff;
        }
        .editor-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .editor-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .editor-label span {
            font-weight: 600;
            color: #e2e8f0;
            font-size: 0.95rem;
        }
        .char-count {
            font-size: 0.8rem;
            color: #64748b;
        }
        textarea {
            width: 100%;
            height: 200px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 16px;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            resize: vertical;
            transition: border-color 0.3s ease;
        }
        textarea:focus {
            outline: none;
            border-color: #00d4ff;
        }
        textarea::placeholder {
            color: #475569;
        }
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 30px 0;
        }
        .btn {
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            color: #fff;
            border: none;
            padding: 14px 36px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }
        .btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn.secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #00d4ff;
            box-shadow: none;
        }
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .success-msg {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .success-msg.show {
            display: block;
        }
        .options {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #a0aec0;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .option input {
            accent-color: #00d4ff;
            width: 16px;
            height: 16px;
        }
        footer {
            text-align: center;
            color: #64748b;
            padding-top: 40px;
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        footer a {
            color: #00d4ff;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Base64 Encoder/Decoder</h1>
            <p class="tagline">Free online tool to encode and decode Base64 strings</p>
        </header>

        <div class="mode-switch">
            <button class="mode-btn active" id="encodeMode">Encode</button>
            <button class="mode-btn" id="decodeMode">Decode</button>
        </div>

        <div class="editor-section">
            <div class="editor-label">
                <span id="inputLabel">Text to Encode</span>
                <span class="char-count" id="charCount">0 characters</span>
            </div>
            <textarea id="input" placeholder="Enter text to encode/decode..."></textarea>
        </div>

        <div class="options">
            <label class="option">
                <input type="checkbox" id="urlSafe" checked>
                URL-safe Base64
            </label>
            <label class="option">
                <input type="checkbox" id="padding" checked>
                Include padding (=)
            </label>
        </div>

        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>

        <div class="action-buttons">
            <button class="btn" id="processBtn">Encode</button>
            <button class="btn secondary" id="swapBtn">Swap</button>
            <button class="btn secondary" id="clearBtn">Clear</button>
            <button class="btn secondary" id="copyBtn">Copy Result</button>
        </div>

        <div class="editor-section" id="outputSection">
            <div class="editor-label">
                <span id="outputLabel">Encoded Result</span>
                <span class="char-count" id="outputCharCount">0 characters</span>
            </div>
            <textarea id="output" placeholder="Result will appear here..." readonly></textarea>
        </div>

        <footer>
            <p>Built by <a href="https://rayyeung1989.github.io/auto-company-tools/" target="_blank">Auto Company</a> - Developer Tools</p>
        </footer>
    </div>

    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const processBtn = document.getElementById('processBtn');
        const swapBtn = document.getElementById('swapBtn');
        const clearBtn = document.getElementById('clearBtn');
        const copyBtn = document.getElementById('copyBtn');
        const encodeMode = document.getElementById('encodeMode');
        const decodeMode = document.getElementById('decodeMode');
        const urlSafe = document.getElementById('urlSafe');
        const padding = document.getElementById('padding');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const inputLabel = document.getElementById('inputLabel');
        const outputLabel = document.getElementById('outputLabel');
        const charCount = document.getElementById('charCount');
        const outputCharCount = document.getElementById('outputCharCount');

        let isEncodeMode = true;

        function updateUI() {
            if (isEncodeMode) {
                encodeMode.classList.add('active');
                decodeMode.classList.remove('active');
                processBtn.textContent = 'Encode';
                inputLabel.textContent = 'Text to Encode';
                outputLabel.textContent = 'Encoded Result';
                input.placeholder = 'Enter text to encode...';
            } else {
                decodeMode.classList.add('active');
                encodeMode.classList.remove('active');
                processBtn.textContent = 'Decode';
                inputLabel.textContent = 'Base64 to Decode';
                outputLabel.textContent = 'Decoded Result';
                input.placeholder = 'Enter Base64 string to decode...';
            }
            hideMessages();
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
            successMsg.classList.remove('show');
        }

        function showSuccess(msg) {
            successMsg.textContent = msg;
            successMsg.classList.add('show');
            errorMsg.classList.remove('show');
        }

        function hideMessages() {
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');
        }

        function base64Encode(str) {
            let encoded = btoa(unescape(encodeURIComponent(str)));
            if (!padding.checked) {
                encoded = encoded.replace(/=+$/, '');
            }
            if (urlSafe.checked) {
                encoded = encoded.replace(/\+/g, '-').replace(/\//g, '_');
            }
            return encoded;
        }

        function base64Decode(str) {
            let decoded = str;
            if (urlSafe.checked) {
                decoded = decoded.replace(/-/g, '+').replace(/_/g, '/');
            }
            while (decoded.length % 4) {
                decoded += '=';
            }
            return decodeURIComponent(escape(atob(decoded)));
        }

        function process() {
            hideMessages();
            const inputValue = input.value.trim();

            if (!inputValue) {
                showError('Please enter some text to process');
                return;
            }

            try {
                if (isEncodeMode) {
                    const encoded = base64Encode(inputValue);
                    output.value = encoded;
                    showSuccess('Encoded successfully!');
                } else {
                    const decoded = base64Decode(inputValue);
                    output.value = decoded;
                    showSuccess('Decoded successfully!');
                }
                updateCharCount();
            } catch (e) {
                showError('Invalid Base64 string. Please check your input.');
            }
        }

        function swap() {
            const temp = input.value;
            input.value = output.value;
            output.value = temp;
            isEncodeMode = !isEncodeMode;
            updateUI();
            updateCharCount();
        }

        function clear() {
            input.value = '';
            output.value = '';
            hideMessages();
            updateCharCount();
        }

        async function copy() {
            if (!output.value) {
                showError('No result to copy');
                return;
            }
            try {
                await navigator.clipboard.writeText(output.value);
                showSuccess('Copied to clipboard!');
            } catch (e) {
                showError('Failed to copy. Please select and copy manually.');
            }
        }

        function updateCharCount() {
            charCount.textContent = `${input.value.length} characters`;
            outputCharCount.textContent = `${output.value.length} characters`;
        }

        encodeMode.addEventListener('click', () => {
            isEncodeMode = true;
            updateUI();
        });

        decodeMode.addEventListener('click', () => {
            isEncodeMode = false;
            updateUI();
        });

        processBtn.addEventListener('click', process);
        swapBtn.addEventListener('click', swap);
        clearBtn.addEventListener('click', clear);
        copyBtn.addEventListener('click', copy);

        input.addEventListener('input', updateCharCount);

        // Process on Ctrl+Enter
        input.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                process();
            }
        });
    </script>
</body>
</html>
